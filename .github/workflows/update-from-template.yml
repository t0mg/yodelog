name: Update from Template

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch template repository and merge
        run: |
          # Configure Git user
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Fetch the original template details from GitHub API (assumes the repo was created from a template)
          TEMPLATE_REPO=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}" | jq -r '.template_repository.full_name')

          if [ "$TEMPLATE_REPO" == "null" ] || [ -z "$TEMPLATE_REPO" ]; then
            echo "Error: Could not determine template repository. Was this repository created from a template?"
            exit 1
          fi

          echo "Template repository: $TEMPLATE_REPO"

          # Get default branch of the template repo
          DEFAULT_BRANCH=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${TEMPLATE_REPO}" | jq -r '.default_branch')

          if [ "$DEFAULT_BRANCH" == "null" ] || [ -z "$DEFAULT_BRANCH" ]; then
            echo "Warning: Could not determine default branch, falling back to main"
            DEFAULT_BRANCH="main"
          fi

          # Add the template repository as a remote
          git remote add template "https://github.com/${TEMPLATE_REPO}.git"
          git fetch template $DEFAULT_BRANCH

          # Merge the template's default branch into a new branch
          BRANCH_NAME="update-from-template-$(date +%s)"
          git checkout -b $BRANCH_NAME

          # Merge changes, allow unrelated histories in case it's needed
          # We don't use -X ours to allow the user to see conflicts in the PR or manually handle them if needed,
          # or maybe just let it fail so they can resolve locally. Actually, for a template sync action, we usually want to commit what we have
          # but actions usually fail if there is a conflict.
          # Let's try to just do the merge.
          if git merge template/$DEFAULT_BRANCH --allow-unrelated-histories -m "Merge template updates"; then
            echo "Merge successful without conflicts."
          else
            echo "Merge had conflicts. Committing the conflict markers."
            # We want to commit the conflicted state so the PR can be created and the user can resolve it
            git add .
            git commit -m "Merge template updates with conflicts"
          fi

          # Push the new branch
          git push origin $BRANCH_NAME

          # Create a pull request using GitHub CLI
          gh pr create --title "Update from template $TEMPLATE_REPO" \
            --body "This PR merges upstream changes from the original template repository." \
            --base main --head $BRANCH_NAME
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
